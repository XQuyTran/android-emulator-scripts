services:
  redroid:
    image: redroid/redroid:13.0.0_magisk_mindthegapps
    container_name: redroid13
    privileged: true
    restart: unless-stopped

    ports:
      - "5555:5555"

    volumes:
      - ./data:/data
      - ./scripts:/opt/scripts:ro

    command:
      # --- ADB ---
      - "androidboot.adb=1"

      # --- Host kernel compatibility ---
      - "androidboot.use_memfd=true"

      # --- TABLET DISPLAY (Redmi Pad SE–like) ---
      - "androidboot.redroid_width=2560"
      - "androidboot.redroid_height=1600"
      - "androidboot.redroid_dpi=320"
      - "androidboot.redroid_fps=60"

      # --- Enable Wi‑Fi abstraction ---
      - "androidboot.redroid_fake_wifi=1"

      # --- Tablet identity (top-level only; details via props.sh) ---
      - "ro.build.characteristics=tablet"
      - "ro.kernel.qemu=0"

      # --- Locale ---
      - "persist.sys.locale=vi-VN"
      - "persist.sys.timezone=Asia/Ho_Chi_Minh"

      # --- Native bridge (leave if you need ARM apps) ---
      - "ro.product.cpu.abilist=x86_64,arm64-v8a,x86,armeabi-v7a,armeabi"
      - "ro.product.cpu.abilist64=x86_64,arm64-v8a"
      - "ro.product.cpu.abilist32=x86,armeabi-v7a,armeabi"
      - "ro.dalvik.vm.native.bridge=libhoudini.so"
      - "ro.enable.native.bridge.exec=1"
      - "ro.vendor.enable.native.bridge.exec=1"
      - "ro.vendor.enable.native.bridge.exec64=1"

